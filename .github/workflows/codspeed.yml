name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest pytest-codspeed

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        env:
          PYTHONPATH: ${{ github.workspace }}
        with:
          mode: simulation
          run: pytest tests/benchmarks --codspeed -q
